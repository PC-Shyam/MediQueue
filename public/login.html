<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediQueue — Login</title>
  <meta name="description" content="Login to MediQueue Hospital Queue Management System" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F5F6F8;
      --surface:    #FFFFFF;
      --surface2:   #F9FAFB;
      --border:     #E4E7EC;
      --primary:    #0D9488;
      --primary-glow: #0D948840;
      --text:       #111827;
      --text-sub:   #6B7280;
      --text-hint:  #9CA3AF;
      --green:      #10B981;
      --red:        #EF4444;
      --radius:     14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: #0d948820;
      top: -100px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #0f766e20;
      bottom: -100px; right: -100px;
      animation-delay: -5s;
    }
    @keyframes drift { to { transform: translate(40px, 30px) scale(1.05); } }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: auto;
    }

    /* Logo */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: white;
    }
    .brand-text { line-height: 1.2; }
    .brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .brand-sub  { font-size: 12px; color: var(--text-sub); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 60px #00000015;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 0.4rem;
      letter-spacing: -0.4px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 1.75rem;
    }

    /* Role tabs */
    .role-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }
    .role-tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-sub);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .role-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 10px var(--primary-glow);
    }
    .role-tab:hover:not(.active) { color: var(--text); background: var(--border); }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-group input::placeholder { color: var(--text-hint); }

    .hint {
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 4px;
    }

    /* PIN inputs */
    .pin-row { display: flex; gap: 8px; }
    .pin-row input {
      flex: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      padding: 12px 6px;
      font-family: 'DM Mono', monospace;
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      border: none;
      border-radius: 11px;
      color: white;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-login:hover  { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { opacity: 1;    transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Error */
    .error-msg {
      background: #ef444415;
      border: 1px solid #ef444440;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Demo hint */
    .demo-hint {
      margin-top: 1.5rem;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-hint);
      line-height: 1.8;
    }
    .demo-hint strong { color: var(--text-sub); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ffffff60;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-icon">＋</div>
      <div class="brand-text">
        <div class="brand-name">MediQueue</div>
        <div class="brand-sub">Apollo Hospital, Chennai</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to access your dashboard</div>

      <div class="role-tabs">
        <button class="role-tab active" id="tab-patient" onclick="setRole('patient')">
          👤 Patient
        </button>
        <button class="role-tab" id="tab-doctor" onclick="setRole('doctor')">
          🩺 Doctor
        </button>
        <button class="role-tab" id="tab-admin" onclick="setRole('admin')">
          ⚙ Admin
        </button>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <!-- Patient fields -->
        <div id="fields-patient">
          <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="p-phone" placeholder="Enter registered phone number" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>4-digit PIN</label>
            <div class="pin-row">
              <input type="password" id="pin-1" maxlength="1" inputmode="numeric" pattern="[0-9]" />
              <input type="password" id="pin-2" maxlength="1" inputmode="numeric" pattern="[0-9]" />
              <input type="password" id="pin-3" maxlength="1" inputmode="numeric" pattern="[0-9]" />
              <input type="password" id="pin-4" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            </div>
            <p class="hint">Default PIN: 1234</p>
          </div>
        </div>

        <!-- Doctor / Admin fields -->
        <div id="fields-staff" style="display:none">
          <div class="form-group">
            <label id="username-label">Username</label>
            <input type="text" id="s-username" placeholder="Enter username" autocomplete="username" />
            <p class="hint" id="username-hint">Use your first name (e.g. priya, meena)</p>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="s-password" placeholder="Enter password" autocomplete="current-password" />
            <p class="hint" id="password-hint">Default: doctor123</p>
          </div>
        </div>

        <button class="btn-login" type="submit" id="login-btn">Sign in →</button>
      </form>

      <div class="demo-hint">
        <strong>Demo accounts:</strong><br>
        Patient: <strong>9876543214</strong> / PIN <strong>1234</strong><br>
        Doctor:  <strong>priya</strong> / <strong>doctor123</strong><br>
        Admin:   <strong>admin</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script>
    let currentRole = 'patient';

    function setRole(role) {
      currentRole = role;
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + role).classList.add('active');

      const isStaff = role === 'doctor' || role === 'admin';
      document.getElementById('fields-patient').style.display = isStaff ? 'none' : '';
      document.getElementById('fields-staff').style.display  = isStaff ? '' : 'none';

      if (role === 'admin') {
        document.getElementById('username-label').textContent = 'Admin Username';
        document.getElementById('username-hint').textContent  = 'e.g. admin';
        document.getElementById('password-hint').textContent  = 'Default: admin123';
        document.getElementById('s-username').placeholder     = 'admin';
      } else if (role === 'doctor') {
        document.getElementById('username-label').textContent = 'Username';
        document.getElementById('username-hint').textContent  = 'Use your first name (e.g. priya, meena)';
        document.getElementById('password-hint').textContent  = 'Default: doctor123';
        document.getElementById('s-username').placeholder     = 'Enter username';
      }
      showError('');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      if (msg) { el.textContent = msg; el.classList.add('show'); }
      else      { el.classList.remove('show'); }
    }

    // Auto-advance PIN fields
    document.querySelectorAll('.pin-row input').forEach((input, idx, all) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value && idx < all.length - 1) all[idx + 1].focus();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && idx > 0) all[idx - 1].focus();
      });
    });

    async function handleLogin(e) {
      e.preventDefault();
      showError('');

      let username, password;

      if (currentRole === 'patient') {
        username = document.getElementById('p-phone').value.trim();
        password = ['pin-1','pin-2','pin-3','pin-4'].map(id => document.getElementById(id).value).join('');
        if (!username) return showError('Please enter your mobile number');
        if (password.length < 4) return showError('Please enter your 4-digit PIN');
      } else {
        username = document.getElementById('s-username').value.trim().toLowerCase();
        password = document.getElementById('s-password').value;
        if (!username) return showError('Please enter your username');
        if (!password) return showError('Please enter your password');
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!data.success) {
          showError(data.error || 'Login failed');
          return;
        }

        // Persist session
        localStorage.setItem('mq_token',       data.data.token);
        localStorage.setItem('mq_role',        data.data.role);
        localStorage.setItem('mq_displayName', data.data.displayName || data.data.username);
        localStorage.setItem('mq_linkedId',    data.data.linkedId || '');

        // Redirect to app
        window.location.href = '/';
      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign in →';
      }
    }
  </script>
</body>
</html>
